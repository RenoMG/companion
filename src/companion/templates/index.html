<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companion</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-0: #090b10;
    --bg-1: #11131a;
    --bg-2: #171b24;
    --surface: #131722;
    --surface-elevated: #1a1f2d;
    --surface-glow: rgba(130, 154, 255, 0.16);
    --text-main: #e9ebf5;
    --text-secondary: #acb2c6;
    --text-muted: #7f869c;
    --border: #2a3040;
    --assistant-bg: #181d2a;
    --user-bg: #4f5ae6;
    --user-bg-soft: #3f49c2;
    --user-text: #f9faff;
    --accent: #7f8cff;
    --accent-strong: #6b79ff;
    --danger: #ff5a74;
    --success: #30c48d;
    --shadow-lg: 0 14px 40px rgba(0, 0, 0, 0.45);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.32);
    --code-bg: #202738;
  }

  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at 20% 10%, #1b2140 0, #0c0f17 35%, #080a0f 100%);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: stretch;
    padding: 20px;
  }

  .app-shell {
    width: min(1024px, 100%);
    height: calc(100vh - 40px);
    background: linear-gradient(170deg, rgba(24,29,42,0.92), rgba(13,17,25,0.94));
    border: 1px solid rgba(130, 154, 255, 0.2);
    border-radius: 24px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: rgba(18, 22, 33, 0.8);
  }

  .brand h1 {
    font-size: 16px;
    font-weight: 650;
    letter-spacing: 0.2px;
  }

  .brand p {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 2px;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .toggle-control {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .switch {
    position: relative;
    display: inline-flex;
    width: 42px;
    height: 24px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: #2e3548;
    border-radius: 999px;
    transition: 0.2s;
  }

  .slider::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    top: 3px;
    border-radius: 50%;
    background: #d0d5e5;
    transition: 0.2s;
  }

  .switch input:checked + .slider {
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--surface-glow);
  }

  .switch input:checked + .slider::before {
    transform: translateX(18px);
    background: white;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
  }

  .messages-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .message { display: flex; max-width: 90%; animation: fadeIn .25s ease; }
  .message.user { align-self: flex-end; }
  .message.assistant { align-self: flex-start; }

  .message-bubble {
    padding: 12px 15px;
    border-radius: 16px;
    line-height: 1.52;
    font-size: 14px;
    word-wrap: break-word;
    overflow-wrap: break-word;
    border: 1px solid transparent;
  }

  .message.user .message-bubble {
    background: linear-gradient(140deg, var(--user-bg), var(--user-bg-soft));
    color: var(--user-text);
    border-bottom-right-radius: 6px;
  }

  .message.assistant .message-bubble {
    background: var(--assistant-bg);
    border-color: #2e3550;
    color: var(--text-main);
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow-md);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-bubble p { margin: 0.35em 0; }
  .message-bubble p:first-child { margin-top: 0; }
  .message-bubble p:last-child { margin-bottom: 0; }
  .message-bubble code {
    background: var(--code-bg);
    border: 1px solid #35405e;
    padding: 2px 5px;
    border-radius: 5px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 12px;
  }
  .message-bubble pre {
    background: var(--code-bg);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.5em 0;
  }
  .message-bubble pre code { border: 0; background: transparent; }
  .message-bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 10px;
    color: var(--text-secondary);
    margin: 0.4em 0;
  }
  .message-bubble ul, .message-bubble ol { margin: .35em 0; padding-left: 1.1em; }

  .typing-indicator { display: inline-flex; gap: 4px; padding: 2px 0; }
  .typing-indicator span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.1s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.14s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.28s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: .7; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .empty-state {
    min-height: 100%;
    display: grid;
    place-content: center;
    text-align: center;
    gap: 8px;
    color: var(--text-muted);
    padding: 40px;
  }
  .empty-state h2 { color: var(--text-main); font-weight: 550; font-size: 23px; }

  .input-area {
    border-top: 1px solid var(--border);
    padding: 14px 20px 18px;
    background: rgba(14, 18, 28, 0.85);
  }

  .input-inner {
    max-width: 760px;
    margin: 0 auto;
    background: var(--surface-elevated);
    border: 1px solid #313a56;
    border-radius: 18px;
    padding: 8px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  #message-input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text-main);
    outline: none;
    resize: none;
    max-height: 130px;
    min-height: 40px;
    line-height: 1.4;
    padding: 10px 8px;
    font-size: 14px;
    font-family: inherit;
  }
  #message-input::placeholder { color: var(--text-muted); }

  .status-pill {
    align-self: center;
    margin-right: 6px;
    padding: 6px 9px;
    border-radius: 999px;
    font-size: 11px;
    border: 1px solid transparent;
    color: var(--text-secondary);
    background: rgba(127, 140, 255, 0.08);
  }
  .status-pill.voice-on {
    color: #dfe5ff;
    border-color: rgba(127, 140, 255, 0.5);
    background: rgba(127, 140, 255, 0.2);
  }
  .status-pill.recording {
    color: #ffdbe1;
    border-color: rgba(255,90,116,0.6);
    background: rgba(255,90,116,0.16);
  }

  .send-btn, .mic-btn {
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: grid;
    place-content: center;
    cursor: pointer;
    transition: transform .12s ease, filter .12s ease, background .2s;
  }

  .send-btn {
    background: linear-gradient(140deg, var(--accent), var(--accent-strong));
    color: white;
  }
  .send-btn:hover { filter: brightness(1.08); }
  .send-btn:active, .mic-btn:active { transform: scale(.95); }
  .send-btn:disabled { opacity: .5; cursor: default; filter: none; }

  .mic-btn {
    background: rgba(127, 140, 255, 0.12);
    border: 1px solid rgba(127, 140, 255, 0.45);
    color: #c9d1ff;
  }
  .mic-btn.hidden { display: none; }
  .mic-btn.recording {
    background: rgba(255,90,116,0.2);
    border-color: rgba(255,90,116,0.75);
    color: #ffd6de;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,90,116,.28); }
    50% { box-shadow: 0 0 0 10px rgba(255,90,116,0); }
  }

  .icon { width: 18px; height: 18px; fill: currentColor; }
</style>
</head>
<body>
<div class="app-shell">
  <div class="header">
    <div class="brand">
      <h1 id="companion-name">Companion</h1>
      <p>Dark voice chat interface</p>
    </div>
    <div class="header-controls">
      <label class="toggle-control">Audio
        <span class="switch">
          <input type="checkbox" id="tts-toggle">
          <span class="slider"></span>
        </span>
      </label>
      <label class="toggle-control">Voice chat
        <span class="switch">
          <input type="checkbox" id="voice-toggle">
          <span class="slider"></span>
        </span>
      </label>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="messages-inner" id="messages-inner">
      <div class="empty-state" id="empty-state">
        <h2>Start a conversation</h2>
        <p>Use text mode or switch Voice chat on to talk.</p>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <textarea id="message-input" rows="1" placeholder="Message Companion..." autocomplete="off"></textarea>
      <span id="voice-status" class="status-pill">Text mode</span>
      <button class="mic-btn hidden" id="mic-btn" title="Start/Stop speaking to transcribe">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm-1-9a1 1 0 012 0v6a1 1 0 01-2 0V5zm6 6a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-5 9a1 1 0 01-1-1v-1.07A7.007 7.007 0 015 11H3a9.008 9.008 0 008 8.93V21a1 1 0 011 1h0a1 1 0 01-1 1h0z"/></svg>
      </button>
      <button class="send-btn" id="send-btn" title="Send message" disabled>
        <svg class="icon" viewBox="0 0 24 24" style="fill:white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  const messagesContainer = document.getElementById('messages');
  const messagesInner = document.getElementById('messages-inner');
  const emptyState = document.getElementById('empty-state');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const micBtn = document.getElementById('mic-btn');
  const ttsToggle = document.getElementById('tts-toggle');
  const voiceToggle = document.getElementById('voice-toggle');
  const voiceStatus = document.getElementById('voice-status');
  const companionName = document.getElementById('companion-name');

  let isStreaming = false;
  let ttsEnabled = true;
  let voiceChatEnabled = false;
  let mediaRecorder = null;
  let isRecording = false;

  fetch('/api/config').then(r => r.json()).then(cfg => {
    companionName.textContent = cfg.companion_name || 'Companion';
    document.title = cfg.companion_name || 'Companion';
    input.placeholder = `Message ${cfg.companion_name || 'Companion'}...`;

    ttsEnabled = cfg.audio_enabled_default !== false;
    voiceChatEnabled = cfg.voice_chat_default === true;
    ttsToggle.checked = ttsEnabled;
    voiceToggle.checked = voiceChatEnabled;
    updateVoiceUi();
  });

  fetch('/api/history').then(r => r.json()).then(messages => {
    if (messages.length > 0) {
      emptyState.remove();
      messages.forEach(m => appendMessage(m.role, m.content));
      scrollToBottom();
    }
  });

  function renderMarkdown(text) {
    let html = text
      .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^>\s*(.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

    html = html.split(/\n\n+/).map(block => {
      block = block.trim();
      if (!block) return '';
      if (/^<(pre|ul|ol|blockquote|li)/.test(block)) return block;
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).join('');

    return html;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function appendMessage(role, content, streaming) {
    if (emptyState && emptyState.parentNode) emptyState.remove();
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    if (streaming) {
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    } else {
      bubble.innerHTML = role === 'user' ? escapeHtml(content).replace(/\n/g, '<br>') : renderMarkdown(content);
    }
    wrapper.appendChild(bubble);
    messagesInner.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });
  }

  async function sendMessage(text) {
    if (!text.trim() || isStreaming) return;
    isStreaming = true;
    sendBtn.disabled = true;
    input.value = '';
    autoResize();

    appendMessage('user', text);
    const bubble = appendMessage('assistant', '', true);

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text})
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullResponse = '';
      let buffer = '';

      bubble.innerHTML = '';

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});

        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.done) break;
            if (data.chunk) {
              fullResponse += data.chunk;
              bubble.innerHTML = renderMarkdown(fullResponse);
              scrollToBottom();
            }
          } catch (e) {}
        }
      }

      if (fullResponse) {
        bubble.innerHTML = renderMarkdown(fullResponse);
      }

      if (ttsEnabled && fullResponse) {
        playTTS(fullResponse);
      }
    } catch (err) {
      bubble.innerHTML = `<p style="color:#ff7a8f">Error: ${escapeHtml(err.message)}</p>`;
    } finally {
      isStreaming = false;
      sendBtn.disabled = !input.value.trim();
    }
  }

  async function playTTS(text) {
    try {
      const response = await fetch('/api/tts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text})
      });
      if (!response.ok) return;
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => URL.revokeObjectURL(url);
      audio.play();
    } catch (e) {
      console.error('TTS playback failed:', e);
    }
  }

  function writeString(view, offset, str) {
    for (let i = 0; i < str.length; i++) {
      view.setUint8(offset + i, str.charCodeAt(i));
    }
  }

  function encodeFloat32Wav(samples, sampleRate) {
    const dataSize = samples.length * 4;
    const buffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(buffer);

    writeString(view, 0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(view, 8, 'WAVE');

    writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 3, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 4, true);
    view.setUint16(32, 4, true);
    view.setUint16(34, 32, true);

    writeString(view, 36, 'data');
    view.setUint32(40, dataSize, true);

    new Float32Array(buffer, 44).set(samples);
    return buffer;
  }

  async function blobToWav16kMono(blob) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await blob.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    const numSamples = Math.ceil(audioBuffer.duration * 16000);
    const offlineCtx = new OfflineAudioContext(1, numSamples, 16000);
    const source = offlineCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(offlineCtx.destination);
    source.start(0);
    const rendered = await offlineCtx.startRendering();

    const pcmData = rendered.getChannelData(0);
    const wavBuffer = encodeFloat32Wav(pcmData, 16000);
    await audioCtx.close();
    return new Blob([wavBuffer], {type: 'audio/wav'});
  }

  function updateVoiceUi() {
    if (!voiceChatEnabled) {
      voiceStatus.textContent = 'Text mode';
      voiceStatus.classList.remove('voice-on', 'recording');
      micBtn.classList.add('hidden');
      if (isRecording && mediaRecorder) {
        mediaRecorder.stop();
      }
      return;
    }

    micBtn.classList.remove('hidden');
    if (isRecording) {
      voiceStatus.textContent = 'Talking… click mic to stop';
      voiceStatus.classList.add('voice-on', 'recording');
    } else {
      voiceStatus.textContent = 'Voice mode on';
      voiceStatus.classList.add('voice-on');
      voiceStatus.classList.remove('recording');
    }
  }

  micBtn.addEventListener('click', async () => {
    if (!voiceChatEnabled) return;

    if (isRecording) {
      mediaRecorder.stop();
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      const chunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        isRecording = false;
        micBtn.classList.remove('recording');
        updateVoiceUi();
        stream.getTracks().forEach(t => t.stop());

        const rawBlob = new Blob(chunks, {type: mediaRecorder.mimeType});
        const wavBlob = await blobToWav16kMono(rawBlob);
        const formData = new FormData();
        formData.append('audio', wavBlob, 'recording.wav');

        micBtn.disabled = true;
        try {
          const resp = await fetch('/api/transcribe', {method: 'POST', body: formData});
          const data = await resp.json();
          if (data.text && data.text.trim()) {
            sendMessage(data.text.trim());
          }
        } catch (e) {
          console.error('Transcription failed:', e);
        } finally {
          micBtn.disabled = false;
          updateVoiceUi();
        }
      };

      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      updateVoiceUi();
    } catch (e) {
      console.error('Mic access denied:', e);
    }
  });

  ttsToggle.addEventListener('change', () => {
    ttsEnabled = ttsToggle.checked;
  });

  voiceToggle.addEventListener('change', () => {
    voiceChatEnabled = voiceToggle.checked;
    updateVoiceUi();
  });

  input.addEventListener('input', () => {
    sendBtn.disabled = !input.value.trim() || isStreaming;
    autoResize();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (input.value.trim() && !isStreaming) sendMessage(input.value);
    }
  });

  sendBtn.addEventListener('click', () => {
    if (input.value.trim() && !isStreaming) sendMessage(input.value);
  });

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 130) + 'px';
  }
})();
</script>
</body>
</html>
