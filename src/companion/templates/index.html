<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companion</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-0: #06070c;
    --bg-1: #0b0d14;
    --bg-2: #121624;
    --surface: rgba(17, 20, 31, 0.85);
    --surface-2: rgba(20, 24, 38, 0.92);
    --text-main: #edf1ff;
    --text-secondary: #abb3cf;
    --text-muted: #7e879f;
    --border: rgba(123, 138, 184, 0.24);
    --accent: #8795ff;
    --accent-strong: #6978ff;
    --user-bg: #4f5ae6;
    --assistant-bg: #1a1f2d;
    --danger: #ff5a74;
    --shadow-lg: 0 22px 54px rgba(0, 0, 0, 0.45);
    --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.32);
  }

  body {
    height: 100vh;
    overflow: hidden;
    min-height: 100vh;
    background: radial-gradient(circle at 20% -5%, #27316a 0, #111526 24%, #07090f 66%, #040509 100%);
    color: var(--text-main);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .app-shell {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(10, 12, 20, 0.6), rgba(8, 10, 16, 0.88));
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 40;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 12, 20, 0.92);
    backdrop-filter: blur(10px);
  }

  .brand h1 { font-size: 18px; font-weight: 700; }
  .brand p { color: var(--text-muted); font-size: 12px; margin-top: 3px; }

  .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

  .mode-switch {
    display: inline-flex;
    background: rgba(126, 137, 172, 0.12);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
  }

  .mode-btn {
    border: 0;
    color: var(--text-secondary);
    background: transparent;
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12px;
    cursor: pointer;
  }

  .mode-btn.active {
    background: linear-gradient(140deg, var(--accent), var(--accent-strong));
    color: white;
  }

  .toggle-control { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
  .switch { position: relative; width: 42px; height: 24px; display: inline-flex; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; border-radius: 999px; background: #343c55; transition: .2s; cursor: pointer; }
  .slider::before {
    content: ""; position: absolute; width: 18px; height: 18px; border-radius: 50%;
    left: 3px; top: 3px; background: #d6dcef; transition: .2s;
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(18px); background: #fff; }

  .view { display: none; flex: 1; min-height: 0; }
  .view.active { display: flex; }

  .text-view { flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 26px 20px; }
  .messages-inner { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; width: 100%; }

  .message { display: flex; max-width: 90%; }
  .message.user { align-self: flex-end; }
  .message.assistant { align-self: flex-start; }
  .message-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.52;
    font-size: 14px;
    word-wrap: break-word;
    border: 1px solid transparent;
  }
  .message.user .message-bubble {
    color: #fff;
    background: linear-gradient(140deg, var(--user-bg), #3e48be);
    border-bottom-right-radius: 6px;
  }
  .message.assistant .message-bubble {
    background: var(--assistant-bg);
    border-color: rgba(120, 136, 180, 0.45);
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow-md);
  }

  .typing-indicator { display: inline-flex; gap: 4px; }
  .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.1s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: .14s; }
  .typing-indicator span:nth-child(3) { animation-delay: .28s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .7; } 30% { transform: translateY(-5px); opacity: 1; } }

  .empty-state { min-height: 100%; display: grid; place-content: center; text-align: center; gap: 8px; color: var(--text-muted); }
  .empty-state h2 { font-size: 24px; font-weight: 620; color: var(--text-main); }

  .input-area {
    position: sticky;
    bottom: 0;
    z-index: 20;
    border-top: 1px solid var(--border);
    background: rgba(8, 10, 17, 0.84);
    padding: 12px 20px 16px;
  }
  .input-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--surface-2);
    border: 1px solid rgba(127, 143, 192, 0.35);
    border-radius: 16px;
    padding: 8px;
  }
  #message-input {
    flex: 1;
    border: 0;
    outline: none;
    resize: none;
    max-height: 140px;
    min-height: 42px;
    color: var(--text-main);
    background: transparent;
    font-family: inherit;
    line-height: 1.42;
    padding: 10px 8px;
  }
  #message-input::placeholder { color: var(--text-muted); }

  .send-btn {
    border: 0;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    cursor: pointer;
    display: grid;
    place-content: center;
    background: linear-gradient(140deg, var(--accent), var(--accent-strong));
    color: #fff;
  }
  .send-btn:disabled { opacity: .5; cursor: default; }

  .voice-view {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px 20px 40px;
    gap: 22px;
  }

  .voice-hint { color: var(--text-muted); font-size: 13px; text-align: center; }

  .spectrum-wrap {
    width: min(64vw, 380px);
    aspect-ratio: 1;
    position: relative;
    display: grid;
    place-items: center;
  }

  .spectrum-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(135,149,255,0.2) 0, rgba(95,110,255,0.1) 45%, rgba(33,38,63,0.2) 70%, rgba(0,0,0,0.08) 100%);
    filter: blur(1px);
    transform: scale(1);
    transition: transform .08s linear;
  }

  #spectrum-canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(18,21,34,0.95) 25%, rgba(10,13,24,0.95) 75%);
    border: 1px solid rgba(130, 144, 186, 0.4);
    box-shadow: 0 0 0 2px rgba(114,126,167,0.25), 0 12px 35px rgba(0,0,0,0.4);
  }

  .voice-status-pill {
    font-size: 12px;
    color: #cfd6f0;
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid rgba(130, 144, 186, 0.6);
    background: rgba(96, 110, 160, 0.2);
  }

  .voice-transcript {
    width: min(980px, 100%);
    padding: 18px 20px;
    border-radius: 16px;
    border: 1px solid rgba(128, 142, 180, 0.35);
    background: rgba(18, 22, 35, 0.42);
    color: var(--text-main);
    backdrop-filter: blur(4px);
    min-height: 88px;
  }

  .voice-transcript h3 { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .08em; }
  .voice-transcript p { line-height: 1.55; opacity: 0.88; }

  .icon { width: 18px; height: 18px; fill: currentColor; }

  @media (max-width: 760px) {
    .header { padding: 12px 14px; align-items: flex-start; }
    .header-controls { width: 100%; justify-content: space-between; }
    .messages, .voice-view { padding-left: 14px; padding-right: 14px; }
    .input-area { padding-left: 14px; padding-right: 14px; }
    .spectrum-wrap { width: min(82vw, 320px); }
    .message { max-width: 96%; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="header">
    <div class="brand">
      <h1 id="companion-name">Companion</h1>
      <p>Dark, full-width chat and voice interfaces</p>
    </div>
    <div class="header-controls">
      <div class="mode-switch" role="tablist" aria-label="Interface mode">
        <button class="mode-btn active" id="text-mode-btn" role="tab" aria-selected="true">Text</button>
        <button class="mode-btn" id="voice-mode-btn" role="tab" aria-selected="false">Voice</button>
      </div>
      <label class="toggle-control">AI voice
        <span class="switch">
          <input type="checkbox" id="tts-toggle">
          <span class="slider"></span>
        </span>
      </label>
    </div>
  </div>

  <section class="view text-view active" id="text-view">
    <div class="messages" id="messages">
      <div class="messages-inner" id="messages-inner">
        <div class="empty-state" id="empty-state">
          <h2>Start a conversation</h2>
          <p>Switch between Text and Voice from the top-right controls.</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <textarea id="message-input" rows="1" placeholder="Message Companion..." autocomplete="off"></textarea>
        <button class="send-btn" id="send-btn" title="Send message" disabled>
          <svg class="icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </section>

  <section class="view voice-view" id="voice-view">
    <div class="voice-status-pill" id="voice-status">Voice mode: listening…</div>
    <div class="spectrum-wrap">
      <div class="spectrum-ring" id="spectrum-ring"></div>
      <canvas id="spectrum-canvas" width="540" height="540" aria-label="AI audio spectrum"></canvas>
    </div>
    <p class="voice-hint" id="voice-hint">Always listening. Start speaking whenever you are ready.</p>
    <div class="voice-transcript">
      <h3>Latest AI reply</h3>
      <p id="voice-transcript-text">No response yet.</p>
    </div>
  </section>
</div>

<script>
(function() {
  const messagesContainer = document.getElementById('messages');
  const messagesInner = document.getElementById('messages-inner');
  const emptyState = document.getElementById('empty-state');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const ttsToggle = document.getElementById('tts-toggle');
  const companionName = document.getElementById('companion-name');
  const textModeBtn = document.getElementById('text-mode-btn');
  const voiceModeBtn = document.getElementById('voice-mode-btn');
  const textView = document.getElementById('text-view');
  const voiceView = document.getElementById('voice-view');
  const voiceStatus = document.getElementById('voice-status');
  const voiceHint = document.getElementById('voice-hint');
  const voiceTranscriptText = document.getElementById('voice-transcript-text');
  const spectrumCanvas = document.getElementById('spectrum-canvas');
  const spectrumRing = document.getElementById('spectrum-ring');

  let isStreaming = false;
  let ttsEnabled = true;
  let activeMode = 'text';

  let micStream = null;
  let micContext = null;
  let micAnalyser = null;
  let micDataArray = null;
  let micMonitoringFrame = null;
  let micRecorder = null;
  let micChunks = [];
  let speechStarted = false;
  let silenceStart = 0;

  let aiAudioCtx = null;
  let aiAnalyser = null;
  let aiDataArray = null;
  let aiSource = null;
  let aiAudio = null;
  let spectrumFrame = null;

  const SPEECH_THRESHOLD = 0.03;
  const SILENCE_HOLD_MS = 1100;

  fetch('/api/config').then(r => r.json()).then(cfg => {
    companionName.textContent = cfg.companion_name || 'Companion';
    document.title = cfg.companion_name || 'Companion';
    input.placeholder = `Message ${cfg.companion_name || 'Companion'}...`;
    ttsEnabled = cfg.audio_enabled_default !== false;
    ttsToggle.checked = ttsEnabled;
  });

  fetch('/api/history').then(r => r.json()).then(messages => {
    if (messages.length > 0) {
      if (emptyState && emptyState.parentNode) emptyState.remove();
      messages.forEach(m => appendMessage(m.role, m.content));
      const latestAssistant = [...messages].reverse().find(m => m.role === 'assistant');
      if (latestAssistant) voiceTranscriptText.textContent = latestAssistant.content;
      scrollToBottom();
    }
  });

  function renderMarkdown(text) {
    let html = text
      .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^>\s*(.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

    return html.split(/\n\n+/).map(block => {
      block = block.trim();
      if (!block) return '';
      if (/^<(pre|ul|ol|blockquote|li)/.test(block)) return block;
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function appendMessage(role, content, streaming) {
    if (emptyState && emptyState.parentNode) emptyState.remove();
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    if (streaming) {
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    } else {
      bubble.innerHTML = role === 'user' ? escapeHtml(content).replace(/\n/g, '<br>') : renderMarkdown(content);
    }
    wrapper.appendChild(bubble);
    messagesInner.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });
  }

  async function sendMessage(text) {
    if (!text.trim() || isStreaming) return;
    isStreaming = true;
    sendBtn.disabled = true;
    input.value = '';
    autoResize();

    appendMessage('user', text);
    const bubble = appendMessage('assistant', '', true);

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text})
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullResponse = '';
      let buffer = '';
      bubble.innerHTML = '';

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});

        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.done) break;
            if (data.chunk) {
              fullResponse += data.chunk;
              bubble.innerHTML = renderMarkdown(fullResponse);
              scrollToBottom();
            }
          } catch (e) {}
        }
      }

      if (fullResponse) {
        bubble.innerHTML = renderMarkdown(fullResponse);
        voiceTranscriptText.textContent = fullResponse;
      }

      if (ttsEnabled && fullResponse) {
        playTTS(fullResponse);
      }
    } catch (err) {
      bubble.innerHTML = `<p style="color:#ff8ca2">Error: ${escapeHtml(err.message)}</p>`;
    } finally {
      isStreaming = false;
      sendBtn.disabled = !input.value.trim();
    }
  }

  async function playTTS(text) {
    try {
      if (aiAudio) {
        aiAudio.pause();
        aiAudio = null;
      }

      const response = await fetch('/api/tts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text})
      });
      if (!response.ok) return;

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      aiAudio = audio;

      if (!aiAudioCtx) {
        aiAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        aiAnalyser = aiAudioCtx.createAnalyser();
        aiAnalyser.fftSize = 256;
        aiDataArray = new Uint8Array(aiAnalyser.frequencyBinCount);
      }

      if (aiSource) aiSource.disconnect();
      aiSource = aiAudioCtx.createMediaElementSource(audio);
      aiSource.connect(aiAnalyser);
      aiAnalyser.connect(aiAudioCtx.destination);

      audio.onended = () => {
        URL.revokeObjectURL(url);
        stopSpectrum();
      };

      if (activeMode === 'voice') startSpectrum();
      await audio.play();
    } catch (e) {
      console.error('TTS playback failed:', e);
      stopSpectrum();
    }
  }

  function setMode(mode) {
    activeMode = mode;
    const inText = mode === 'text';
    textView.classList.toggle('active', inText);
    voiceView.classList.toggle('active', !inText);
    textModeBtn.classList.toggle('active', inText);
    voiceModeBtn.classList.toggle('active', !inText);
    textModeBtn.setAttribute('aria-selected', String(inText));
    voiceModeBtn.setAttribute('aria-selected', String(!inText));

    if (!inText) {
      startAlwaysListening();
      startSpectrum();
    } else {
      stopAlwaysListening();
      stopSpectrum();
    }
  }

  function calcRms(timeData) {
    let sum = 0;
    for (let i = 0; i < timeData.length; i++) {
      const centered = (timeData[i] - 128) / 128;
      sum += centered * centered;
    }
    return Math.sqrt(sum / timeData.length);
  }

  async function transcribeAndSend(blob) {
    const formData = new FormData();
    formData.append('audio', blob, 'recording.webm');
    voiceStatus.textContent = 'Voice mode: transcribing…';

    try {
      const resp = await fetch('/api/transcribe', {method: 'POST', body: formData});
      const data = await resp.json();
      if (data.text && data.text.trim()) {
        voiceHint.textContent = `Heard: “${data.text.trim()}”`;
        sendMessage(data.text.trim());
      }
    } catch (e) {
      console.error('Transcription failed:', e);
    } finally {
      voiceStatus.textContent = 'Voice mode: listening…';
    }
  }

  async function startAlwaysListening() {
    if (micStream) return;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({audio: true});
      micContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = micContext.createMediaStreamSource(micStream);
      micAnalyser = micContext.createAnalyser();
      micAnalyser.fftSize = 1024;
      micDataArray = new Uint8Array(micAnalyser.fftSize);
      source.connect(micAnalyser);

      micRecorder = new MediaRecorder(micStream);
      micChunks = [];

      micRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) micChunks.push(e.data);
      };

      micRecorder.onstop = async () => {
        if (!speechStarted || micChunks.length === 0) return;
        const blob = new Blob(micChunks, {type: micRecorder.mimeType});
        micChunks = [];
        speechStarted = false;
        silenceStart = 0;
        await transcribeAndSend(blob);
        if (activeMode === 'voice' && micRecorder && micRecorder.state === 'inactive') {
          micRecorder.start();
        }
      };

      micRecorder.start();
      voiceStatus.textContent = 'Voice mode: listening…';
      monitorMic();
    } catch (e) {
      voiceStatus.textContent = 'Mic access unavailable';
      voiceHint.textContent = 'Allow microphone access to use hands-free voice mode.';
      console.error('Mic access denied:', e);
    }
  }

  function monitorMic() {
    if (!micAnalyser) return;

    const loop = () => {
      if (!micAnalyser || activeMode !== 'voice') return;

      micAnalyser.getByteTimeDomainData(micDataArray);
      const rms = calcRms(micDataArray);
      const now = performance.now();

      if (rms > SPEECH_THRESHOLD) {
        speechStarted = true;
        silenceStart = 0;
        voiceStatus.textContent = 'Voice mode: listening (speech detected)…';
      } else if (speechStarted) {
        if (!silenceStart) silenceStart = now;
        if (now - silenceStart > SILENCE_HOLD_MS && micRecorder && micRecorder.state === 'recording') {
          micRecorder.stop();
          voiceStatus.textContent = 'Voice mode: processing…';
        }
      }

      micMonitoringFrame = requestAnimationFrame(loop);
    };

    micMonitoringFrame = requestAnimationFrame(loop);
  }

  function stopAlwaysListening() {
    if (micMonitoringFrame) cancelAnimationFrame(micMonitoringFrame);
    micMonitoringFrame = null;
    speechStarted = false;
    silenceStart = 0;

    if (micRecorder && micRecorder.state !== 'inactive') {
      micRecorder.onstop = null;
      micRecorder.stop();
    }

    if (micStream) {
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
    }

    if (micContext) {
      micContext.close();
      micContext = null;
    }

    micRecorder = null;
    micAnalyser = null;
    micDataArray = null;
    voiceStatus.textContent = 'Voice mode: paused';
  }

  function startSpectrum() {
    if (spectrumFrame) return;
    const ctx = spectrumCanvas.getContext('2d');

    const draw = () => {
      const w = spectrumCanvas.width;
      const h = spectrumCanvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const baseRadius = 160;

      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.translate(cx, cy);

      let energy = 0;
      if (aiAnalyser && aiDataArray && aiAudio && !aiAudio.paused) {
        aiAnalyser.getByteFrequencyData(aiDataArray);
        const bars = 84;
        for (let i = 0; i < bars; i++) {
          const val = aiDataArray[Math.floor((i / bars) * aiDataArray.length)] / 255;
          energy += val;
          const angle = (Math.PI * 2 * i) / bars;
          const len = 24 + val * 72;
          const x1 = Math.cos(angle) * baseRadius;
          const y1 = Math.sin(angle) * baseRadius;
          const x2 = Math.cos(angle) * (baseRadius + len);
          const y2 = Math.sin(angle) * (baseRadius + len);
          ctx.strokeStyle = `rgba(141, 154, 255, ${0.35 + val * 0.65})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
        energy /= bars;
      } else {
        for (let i = 0; i < 56; i++) {
          const angle = (Math.PI * 2 * i) / 56;
          const pulse = Math.sin(performance.now() / 600 + i) * 0.08 + 0.12;
          const x1 = Math.cos(angle) * baseRadius;
          const y1 = Math.sin(angle) * baseRadius;
          const x2 = Math.cos(angle) * (baseRadius + 16 + pulse * 10);
          const y2 = Math.sin(angle) * (baseRadius + 16 + pulse * 10);
          ctx.strokeStyle = 'rgba(113, 127, 170, 0.22)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
        energy = 0.08;
      }

      spectrumRing.style.transform = `scale(${1 + energy * 0.3})`;
      ctx.restore();
      spectrumFrame = requestAnimationFrame(draw);
    };

    spectrumFrame = requestAnimationFrame(draw);
  }

  function stopSpectrum() {
    if (spectrumFrame) cancelAnimationFrame(spectrumFrame);
    spectrumFrame = null;
    spectrumRing.style.transform = 'scale(1)';
  }

  ttsToggle.addEventListener('change', () => {
    ttsEnabled = ttsToggle.checked;
    if (!ttsEnabled && aiAudio) aiAudio.pause();
  });

  textModeBtn.addEventListener('click', () => setMode('text'));
  voiceModeBtn.addEventListener('click', () => setMode('voice'));

  input.addEventListener('input', () => {
    sendBtn.disabled = !input.value.trim() || isStreaming;
    autoResize();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (input.value.trim() && !isStreaming) sendMessage(input.value);
    }
  });

  sendBtn.addEventListener('click', () => {
    if (input.value.trim() && !isStreaming) sendMessage(input.value);
  });

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }
})();
</script>
</body>
</html>
